apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-practice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jenkins-practice
  template:
    metadata:
      labels:
        app: jenkins-practice
    spec:
      containers:
      - name: jenkins-practice
        image: docker-host:5000/jenkins-practice:latest
        ports:
        - containerPort: 8080
        

